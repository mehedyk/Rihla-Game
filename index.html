<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Rihla — An Islamic Journey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a0a00;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-container canvas {
      display: block;
      image-rendering: pixelated;
    }

    #orientation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a0a00;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0c060;
      font-family: Georgia, serif;
      text-align: center;
      gap: 24px;
    }
    #orientation-overlay.visible { display: flex; }
    #orientation-overlay .phone-icon {
      width: 60px;
      height: 90px;
      border: 4px solid #f0c060;
      border-radius: 12px;
      position: relative;
      animation: rotatePhone 2s ease-in-out infinite;
    }
    #orientation-overlay .phone-icon::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #f0c060;
    }
    @keyframes rotatePhone {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(0deg); }
      60%  { transform: rotate(90deg); }
      100% { transform: rotate(90deg); }
    }
    #orientation-overlay h2 { font-size: 1.4rem; letter-spacing: 2px; }
    #orientation-overlay p  { font-size: 0.95rem; opacity: 0.7; }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #1a0a00;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0c060;
      font-family: Georgia, serif;
      gap: 16px;
      transition: opacity 0.5s;
    }
    #loading-screen h1 { font-size: 2.2rem; letter-spacing: 4px; }
    #loading-screen p  { font-size: 0.9rem; opacity: 0.6; letter-spacing: 2px; }
    #loading-bar-wrap  { width: 200px; height: 4px; background: rgba(240,192,96,0.2); border-radius: 2px; }
    #loading-bar       { height: 100%; background: #f0c060; border-radius: 2px; width: 0%; transition: width 0.3s; }
  </style>
  <script type="module" crossorigin src="./assets/index-Bh609x56.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/phaser-0RJB29YE.js">
</head>
<body>
  <div id="orientation-overlay">
    <div class="phone-icon"></div>
    <h2>ROTATE DEVICE</h2>
    <p>This game plays in landscape mode</p>
  </div>

  <div id="loading-screen">
    <h1>رِحْلَة</h1>
    <p>RIHLA — THE JOURNEY</p>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="game-container"></div>

  <script>
    function checkOrientation() {
      const ov = document.getElementById('orientation-overlay');
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (isMobile && window.innerHeight > window.innerWidth) {
        ov.classList.add('visible');
      } else {
        ov.classList.remove('visible');
      }
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    checkOrientation();
  </script>
</body>
</html>
